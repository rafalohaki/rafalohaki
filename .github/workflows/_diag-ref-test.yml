name: Diag - octokit getRef
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Reproduce metrics getRef via @actions/github
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const res = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/main'
              })
              core.info(`getRef OK: ${res.status} ref=${res.data.ref} sha=${res.data.object.sha}`)
            } catch (e) {
              core.error(`getRef FAILED: status=${e.status} message=${e.message}`)
              core.error(`response url: ${e.response?.url}`)
              throw e
            }
