name: Diag - ref endpoint
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Probe git/ref/heads/main with GITHUB_TOKEN
        run: |
          set +e
          echo "=== with GITHUB_TOKEN ==="
          curl -sS -o resp.txt -w "HTTP %{http_code}\n" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/rafalohaki/rafalohaki/git/ref/heads/main"
          echo "--- first 200 bytes of body ---"
          head -c 200 resp.txt; echo
          echo "=== with METRICS_TOKEN ==="
          curl -sS -o resp2.txt -w "HTTP %{http_code}\n" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.METRICS_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/rafalohaki/rafalohaki/git/ref/heads/main"
          echo "--- first 200 bytes of body ---"
          head -c 200 resp2.txt; echo
