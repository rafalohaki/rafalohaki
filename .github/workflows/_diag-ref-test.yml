name: Diag - encoded url
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Compare encoded vs unencoded ref URL
        run: |
          set +e
          echo "=== /git/ref/heads/main (slash, unencoded) ==="
          curl -sS -o a.txt -w "HTTP %{http_code}\n" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/rafalohaki/rafalohaki/git/ref/heads/main"
          head -c 120 a.txt; echo
          echo "=== /git/ref/heads%2Fmain (encoded slash — what metrics sends) ==="
          curl -sS -o b.txt -w "HTTP %{http_code}\n" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/rafalohaki/rafalohaki/git/ref/heads%2Fmain"
          head -c 120 b.txt; echo
          echo "=== octokit-style: with User-Agent + X-GitHub-Api-Version, encoded ==="
          curl -sS -o c.txt -w "HTTP %{http_code}\n" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "User-Agent: lowlighter/metrics" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/rafalohaki/rafalohaki/git/ref/heads%2Fmain"
          head -c 120 c.txt; echo
