
name: Metrics
on:
  # Schedule updates (each hour). This is also the natural retry mechanism:
  # lowlighter/metrics has no built-in retry on transient HTTP 503 from
  # GitHub's API, so a single run can fail during an API hiccup — the next
  # hourly run picks it up.
  schedule: [{cron: "0 * * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # NOTE: do NOT add an `id:` to this step. lowlighter/metrics derives the
      # docker image source from `github.action`, and when a step has an id
      # that context returns the step id instead of "lowlighter/metrics" —
      # which makes metrics think it is running from a fork and rebuilds the
      # image locally (slow, and the old Dockerfile no longer builds).
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          # The following scopes are required:
          #  - public_access (default scope)
          # The following additional scopes may be required:
          #  - read:org      (for organization related metrics)
          #  - read:user     (for user related data)
          #  - read:packages (for some packages related data)
          #  - repo          (optional, if you want to include private repositories)
          # The classic PAT stored in METRICS_TOKEN expired (returns HTTP 401
          # "Bad credentials") — this is the root cause of updates stopping in
          # October 2025. The built-in GITHUB_TOKEN works for both reading
          # public user data and committing the rendered SVG (the job's
          # `permissions: contents: write` grants the commit access). To
          # restore private/org metrics, generate a new PAT (read:user,
          # read:org), store it in the METRICS_TOKEN secret, and switch this
          # line back to `${{ secrets.METRICS_TOKEN }}`.
          token: ${{ secrets.GITHUB_TOKEN }}

          # Options
          user: rafalohaki
          template: classic
          base: header, activity, community, repositories, metadata
          config_octicon: yes
          config_timezone: Europe/Warsaw
          config_twemoji: yes
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_anilist: yes
          plugin_anilist_limit: 2
          plugin_anilist_limit_characters: 22
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: favorites, reading
          plugin_anilist_shuffle: yes
          plugin_anilist_user: .user.login
          plugin_fortune: yes
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: commit
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 28
          plugin_people_types: followers, following
